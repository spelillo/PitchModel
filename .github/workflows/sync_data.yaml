name: BigQuery Statcast Sync

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug File Path
        # This will list every file in the repo so we can see the exact path
        run: |
          echo "CURRENT DIRECTORY:"
          pwd
          echo "LISTING ALL FILES:"
          ls -R

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R dependencies
        run: |
          install.packages(c("remotes", "pak"))
          options(repos = c(PPM = "https://packagemanager.posit.co/cran/__linux__/jammy/latest", CRAN = "https://cloud.r-project.org"))
          pak::pkg_install(c("baseballr", "bigrquery", "tidyverse", "lubridate", "DBI"))
        shell: Rscript {0}

      - name: Run Scrape Ingestion
        env:
          GCP_AUTH_JSON: ${{ secrets.BIGQUERY_JSON }}
        # We start from the root. Based on your previous error, 
        # this path should be exactly where the file lives.
        run: Rscript PitchModel/scripts/big-beautiful-scrape.R

      - name: Update Pitcher Baselines
        env:
          GCP_AUTH_JSON: ${{ secrets.BIGQUERY_JSON }}
        run: Rscript PitchModel/scripts/calculate_baselines.R
