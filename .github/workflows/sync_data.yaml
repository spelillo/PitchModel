name: BigQuery Statcast Sync

on:
  schedule:
    # Runs every Monday at 3 AM
    - cron: '0 3 * * 1'
  workflow_dispatch: # Allows you to trigger it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    ## KEY CHANGE: This tells GitHub to run all 'run' commands from inside the PitchModel folder.
    ## This solves the 'No such file or directory' error for your scripts.
    defaults:
      run:
        working-directory: ./PitchModel

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup R
        ## KEY CHANGE: Fixed the versioning from v2-5 to v2 to ensure the action can be resolved.
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        ## HOW IT WORKS: These are Linux-level libraries required to compile R packages like 'curl'.
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R dependencies
        ## HOW IT WORKS: Uses 'pak' for faster, parallel installation of your analytics toolkit.
        run: |
          install.packages(c("remotes", "pak"))
          pak::pkg_install(c("baseballr", "bigrquery", "tidyverse", "lubridate", "DBI"))
        shell: Rscript {0}

      - name: Run Scrape Ingestion
        ## HOW IT WORKS: Executes the resilient loop to pull new data into BigQuery.
        env:
          GCP_AUTH_JSON: ${{ secrets.BIGQUERY_JSON }}
        run: Rscript scripts/big-beautfiul-scrape.R

      - name: Update Pitcher Baselines
        ## HOW IT WORKS: Runs the 'Time-Machine' backtest to calculate pitcher-specific reliability thresholds.
        env:
          GCP_AUTH_JSON: ${{ secrets.BIGQUERY_JSON }}
        run: Rscript scripts/calculate_baselines.R
