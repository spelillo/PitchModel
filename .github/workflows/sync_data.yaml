name: Weekly Statcast Sync
on:
  schedule:
    - cron: '0 3 * * 1' # 3:00 AM every Monday
  workflow_dispatch: # Manual run button

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: r-lib/actions/setup-r@v2
      - name: Install Packages
        run: |
          Rscript -e 'install.packages(c("tidyverse", "googledrive", "vroom"))'
      - name: Run Scraper
        env:
          GOOGLE_AUTH: ${{ secrets.GOOGLE_AUTH }}
        run: Rscript biggerscript.R