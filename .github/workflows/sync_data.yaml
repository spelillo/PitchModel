name: Weekly Statcast Sync
on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  sync_data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true # This uses "pre-compiled" binaries (FAST!)

      - name: Install dependencies
        run: |
          install.packages("pak")
          pak::pkg_install(c("tidyverse", "googledrive", "vroom", "readr"))
        shell: Rscript {0}

      - name: Run Scraper
        env:
          GOOGLE_AUTH: ${{ secrets.GOOGLE_AUTH }}
        run: Rscript biggerscript.R